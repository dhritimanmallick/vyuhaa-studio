name: Build Vyuhaa Video Studio

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags e.g. v1.0.0
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @openreel/web build
        env:
          NODE_ENV: production

      - name: Copy web build to Electron wrapper
        shell: bash
        run: |
          mkdir -p dist
          cp -r apps/web/dist/* dist/

      - name: Install Electron dependencies
        run: |
          cd electron-wrapper
          pnpm install

      - name: Build Windows installer
        run: |
          cd electron-wrapper
          pnpm build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VyuhaaVideoStudio-Windows-Setup
          path: electron-wrapper/release/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron-wrapper/release/*.exe
          name: Vyuhaa Video Studio ${{ github.ref_name }}
          body: |
            ## Vyuhaa Video Studio ${{ github.ref_name }}
            
            Professional video editor for medical researchers and medtech teams.
            
            ### Features
            - Multi-track timeline video editing
            - Auto-captions and subtitle tools
            - Color grading and video effects
            - GPU-accelerated export
            - 100% offline — your files never leave your computer
            
            ### Installation
            1. Download `VyuhaaVideoStudio-Setup.exe` below
            2. Run the installer
            3. Launch from Desktop or Start Menu
            
            Built on OpenReel · Powered by Vyuhaa Med Data · www.vyuhaadata.com
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

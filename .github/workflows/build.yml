name: Build Vyuhaa Video Studio

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install OpenReel dependencies
        working-directory: openreel-video-main
        run: pnpm install

      - name: Build OpenReel web app
        working-directory: openreel-video-main
        run: pnpm --filter @openreel/web build
        env:
          NODE_ENV: production

      - name: Install Electron wrapper dependencies
        working-directory: electron-wrapper
        run: pnpm install

      - name: Copy web build into Electron wrapper
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "electron-wrapper\dist"
          Copy-Item -Path "openreel-video-main\apps\web\dist\*" -Destination "electron-wrapper\dist\" -Recurse -Force
          Write-Host "Contents of electron-wrapper\dist:"
          Get-ChildItem "electron-wrapper\dist"

      - name: Verify dist exists
        shell: pwsh
        run: |
          if (-not (Test-Path "electron-wrapper\dist\index.html")) {
            Write-Error "dist/index.html not found - web build may have failed"
            exit 1
          }
          Write-Host "dist/index.html found OK"

      - name: Build Windows installer
        working-directory: electron-wrapper
        run: pnpm build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release folder
        shell: pwsh
        run: Get-ChildItem "electron-wrapper\release" -Recurse

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: VyuhaaVideoStudio-Windows-Setup
          path: electron-wrapper/release/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: electron-wrapper/release/*.exe
          name: Vyuhaa Video Studio ${{ github.ref_name }}
          body: |
            ## Vyuhaa Video Studio ${{ github.ref_name }}
            Professional video editor for medical researchers and medtech teams.
            Built on OpenReel · Powered by Vyuhaa Med Data · www.vyuhaadata.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
